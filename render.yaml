services:
  - type: web
    name: stacks-academy-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: stacks-academy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: STACKS_NETWORK
        value: testnet
      - key: STACKS_API_URL
        value: https://api.testnet.hiro.so
      - key: STACKS_ADMIN_PRIVATE_KEY
        sync: false
      - key: CERTIFICATE_CONTRACT_ADDRESS
        sync: false
      - key: CERTIFICATE_CONTRACT_NAME
        value: stacks-academy-cert
      - key: LOG_LEVEL
        value: info

databases:
  - name: stacks-academy-db
    databaseName: stacks_academy
    user: stacks_academy
